<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>⚡ La Máquina del Tiempo Familiar ⚡</title>

<style>

body{
margin:0;
background:#030712;
color:white;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.container{
max-width:1200px;
margin:auto;
padding:15px;
}

.title{
text-align:center;
font-size:2rem;
color:#7df9ff;
margin-top:15px;
}

.subtitle{
text-align:center;
color:#cdefff;
margin-bottom:20px;
}

.flux{
height:140px;
width:180px;
margin:auto;
position:relative;
}

.line{
position:absolute;
background:#7df9ff;
box-shadow:0 0 15px #7df9ff;
animation:pulse 1.2s infinite;
}

.l1{
width:6px;
height:120px;
left:87px;
}

.l2{
width:6px;
height:90px;
left:45px;
top:45px;
transform:rotate(35deg);
}

.l3{
width:6px;
height:90px;
left:129px;
top:45px;
transform:rotate(-35deg);
}

@keyframes pulse{
50%{
opacity:.3;
}
}

.panel{
background:#07111d;
border:1px solid #14304a;
border-radius:18px;
padding:15px;
margin-bottom:20px;
}

.panel-title{
font-size:1.3rem;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:15px;
}

.green{
color:#00ff66;
}

.pink{
color:#ff80d5;
}

.blue{
color:#65c8ff;
}

.orange{
color:#ffb347;
}

.progress{
height:22px;
background:#111;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
width:0%;
}

.placeholder{
opacity:.7;
}

@media(max-width:600px){

.title{
font-size:1.5rem;
}

}

</style>
</head>

<body>

<div class="container">

<div class="title">
⚡ LA MÁQUINA DEL TIEMPO FAMILIAR ⚡
</div>

<div class="subtitle">
Cristian · Lorena · Leo · Alex
</div>

<div class="flux">
<div class="line l1"></div>
<div class="line l2"></div>
<div class="line l3"></div>
</div>

<div class="panel">
<div class="panel-title">
⚡ Panel Familiar
</div>

<div id="familia" class="placeholder">
Cargando datos familiares...
</div>
</div>

<div class="grid">

<div class="panel">
<div class="panel-title green">
🟢 Cristian
</div>

<div id="cristian">
Preparando panel...
</div>

<div class="progress">
<div id="cristianBar" class="bar" style="background:#00ff66"></div>
</div>

</div>

<div class="panel">
<div class="panel-title pink">
🩷 Lorena
</div>

<div id="lorena">
Preparando panel...
</div>

<div class="progress">
<div id="lorenaBar" class="bar" style="background:#ff80d5"></div>
</div>

</div>

<div class="panel">
<div class="panel-title blue">
🔵 Leo
</div>

<div id="leo">
Preparando panel...
</div>

<div class="progress">
<div id="leoBar" class="bar" style="background:#65c8ff"></div>
</div>

</div>

<div class="panel">
<div class="panel-title orange">
🟠 Alex
</div>

<div id="alex">
Preparando panel...
</div>

<div class="progress">
<div id="alexBar" class="bar" style="background:#ffb347"></div>
</div>

</div>

</div>

</div>
<script>

const personas = {

Cristian:{
fecha:new Date("1993-06-05T00:00:00")
},

Lorena:{
fecha:new Date("1991-07-28T00:00:00")
},

Leo:{
fecha:new Date("2026-05-14T19:32:00")
},

Alex:{
fecha:new Date("2026-05-14T20:50:00")
}

};

function obtenerDatos(fecha){

const ahora = new Date();

let años =
ahora.getFullYear() - fecha.getFullYear();

const cumplido =
(ahora.getMonth() > fecha.getMonth()) ||

(
ahora.getMonth() === fecha.getMonth() &&
ahora.getDate() >= fecha.getDate()
);

if(!cumplido){
años--;
}

let ultimoCumple = new Date(

ahora.getFullYear(),
fecha.getMonth(),
fecha.getDate(),
fecha.getHours(),
fecha.getMinutes(),
fecha.getSeconds()

);

if(ultimoCumple > ahora){
ultimoCumple.setFullYear(
ultimoCumple.getFullYear()-1
);
}

const ms = ahora - ultimoCumple;

const dias =
Math.floor(ms/86400000);

const horas =
Math.floor(ms/3600000)%24;

const minutos =
Math.floor(ms/60000)%60;

const segundos =
Math.floor(ms/1000)%60;

let proximo = new Date(

ahora.getFullYear(),
fecha.getMonth(),
fecha.getDate(),
fecha.getHours(),
fecha.getMinutes(),
fecha.getSeconds()

);

if(proximo < ahora){
proximo.setFullYear(
proximo.getFullYear()+1
);
}

return{
años,
dias,
horas,
minutos,
segundos,
proximo
};

}

function actualizarPersona(nombre,id,barra){

const d =
obtenerDatos(
personas[nombre].fecha
);

document.getElementById(id).innerHTML = `

<div>

<b>${d.años} años</b>

<br><br>

${d.dias} días

${d.horas}h

${d.minutos}m

${d.segundos}s

<br><br>

<b>Destino temporal</b>

<br>

${d.proximo.toLocaleString('es-ES')}

</div>

`;

document.getElementById(barra).style.width =
Math.min(d.años,100)+"%";

}

function function actualizarFamilia(){

const ahora = new Date();

const inicio =
new Date("2026-05-14T19:32:00");

const diasFamilia =
Math.floor(
(ahora - inicio)/86400000
);

const nombres = Object.keys(personas);

let sumaAnios = 0;
let sumaDiasVividos = 0;

let masJoven = "";
let masVeterano = "";

let fechaMasJoven = new Date(0);
let fechaMasVeterano = new Date();

let proximoNombre = "";
let proximoFecha = null;

for(const nombre of nombres){

const fecha = personas[nombre].fecha;

const datos = obtenerDatos(fecha);

sumaAnios += datos.años;

sumaDiasVividos +=
Math.floor(
(ahora-fecha)/86400000
);

if(fecha > fechaMasJoven){
fechaMasJoven = fecha;
masJoven = nombre;
}

if(fecha < fechaMasVeterano){
fechaMasVeterano = fecha;
masVeterano = nombre;
}

if(
!proximoFecha ||
datos.proximo < proximoFecha
){
proximoFecha = datos.proximo;
proximoNombre = nombre;
}

}

document.getElementById("familia").innerHTML = `

<b>Tiempo juntos como familia</b>

<br><br>

${diasFamilia} días

<hr>

<b>Edad total combinada</b>

<br>

${sumaAnios} años

<hr>

<b>Días vividos entre todos</b>

<br>

${sumaDiasVividos.toLocaleString('es-ES')}

<hr>

<b>Próximo cumpleaños</b>

<br>

${proximoNombre}

<br>

${proximoFecha.toLocaleDateString('es-ES')}

<hr>

<b>Miembro más joven</b>

<br>

${masJoven}

<hr>

<b>Miembro más veterano</b>

<br>

${masVeterano}

`;

}

document.getElementById("familia").innerHTML = `

<b>Tiempo juntos como familia</b>

<br><br>

${dias} días

`;

}

function actualizarTodo(){

actualizarPersona(
"Cristian",
"cristian",
"cristianBar"
);

actualizarPersona(
"Lorena",
"lorena",
"lorenaBar"
);

actualizarPersona(
"Leo",
"leo",
"leoBar"
);

actualizarPersona(
"Alex",
"alex",
"alexBar"
);

actualizarFamilia();

}

actualizarTodo();

setInterval(
actualizarTodo,
1000
);

</script>
</body>
</html>
