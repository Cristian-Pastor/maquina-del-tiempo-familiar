<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Máquina del Tiempo Familiar</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #0f0f1a);
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
        p {
            color: #bbb;
            font-size: 1.1em;
        }
        .btn {
            background: #00ffcc;
            color: #0f0f1a;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.3);
        }
        .btn:hover {
            background: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.4);
        }
        #resultado {
            margin-top: 25px;
            font-size: 1.2em;
            font-weight: bold;
            color: #ff007f;
            text-shadow: 0 0 5px rgba(255, 0, 127, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚡ La Máquina del Tiempo Familiar ⚡</h1>
        <p>Viaja a los momentos más importantes de nuestra historia.</p>
        
        <button class="btn" onclick="viajarAlTiempo()">¡Iniciar Viaje Temporal!</button>
        
        <div id="resultado"></div>
    </div>

    <script>
        function viajarAlTiempo() {
            const momentos = [
                "📅 ¡Año 2026! El año en que la familia creció y se llenó de pañales por partida doble. 🍼🍼",
                "🌅 Un día cualquiera del futuro, disfrutando de la energía del sol en nuestra propia casa.",
                "🚗 Un viaje por carretera con la música a tope y el maletero lleno de recuerdos.",
                "✨ ¡Destino secreto! Un momento del futuro que aún está por escribirse."
            ];
            
            // Selecciona un momento aleatorio
            const eleccion = momentos[Math.floor(Math.random() * momentos.length)];
            document.getElementById('resultado').innerText = eleccion;
        }
    </script>

</body>
</html>
